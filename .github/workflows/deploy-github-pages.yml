# Builds the Vite app in sportathon-scorecard/ and deploys to GitHub Pages.
# Site URL: https://divyanshu-kumar123.github.io/CricketScorecard/
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # FIX 1: Bumped Node to 22 to clear deprecation warnings
      - uses: actions/setup-node@v4
        with:
          node-version: '22' 
          cache: npm
          cache-dependency-path: sportathon-scorecard/package-lock.json
          
      # FIX 2: Added the missing configure-pages setup step
      - name: Setup Pages
        uses: actions/configure-pages@v5 
        
      - name: Install and build
        working-directory: sportathon-scorecard
        run: |
          npm ci
          npm run build
          
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: sportathon-scorecard/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4